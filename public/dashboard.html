<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard — ChordRush</title>
<meta name="description" content="Your ChordRush stats and progress.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://chordrush.app/dashboard">

<link rel="stylesheet" href="/style.css">
</head>
<body>

  <header class="nav">
    <a class="brand" href="/">
      <svg class="logo" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><path d="M9 8l4 4-4 4"/><path d="M15 8v8"/></svg>
      <span><span class="accent">Chord</span>Rush</span>
    </a>
    <div class="nav-account" id="navAccount"></div>
  </header>

  <main class="main">
    <div class="dash-gate" id="dashGate" hidden>
      <p>Log in to see your dashboard.</p>
      <a href="/">← back to ChordRush</a>
    </div>

    <div id="dashContent" hidden>
      <div class="kpis">
        <div class="kpi"><div class="kpi-val" id="kTrials">–</div><div class="kpi-lab">time trials</div></div>
        <div class="kpi"><div class="kpi-val" id="kChords">–</div><div class="kpi-lab">chords played</div></div>
        <div class="kpi"><div class="kpi-val" id="kSeconds">–</div><div class="kpi-lab">time raced</div></div>
      </div>

      <div class="dash-section">
        <div class="dash-title">completion time by game</div>
        <div class="filterbar" id="typeToggle">
          <button class="filter active" data-type="major">majors</button>
          <button class="filter" data-type="minor">minors</button>
        </div>
        <div class="filterbar" id="invToggle">
          <button class="filter active" data-inv="0">root</button>
          <button class="filter" data-inv="1">1st inv</button>
          <button class="filter" data-inv="2">2nd inv</button>
        </div>
        <div class="pr-banner" id="prBanner"></div>
        <div id="chart"></div>
        <div class="chart-empty" id="chartEmpty" style="display:none;">no runs yet</div>
      </div>
    </div>
  </main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient(
  'https://pkrvnrgqtuvbtusdncok.supabase.co',
  'sb_publishable_511wgi5up_rKkUMIL91U7A_i_FhDnhE'
);
const $ = id => document.getElementById(id);

let allScores = [];
let mode = 'major';
const TYPE_LABEL = { major:'majors', minor:'minors' };
const INV_LABEL  = ['root','1st inv','2nd inv','3rd inv'];
// Same selection model as the main page: toggle type(s) + inversion(s); the chosen
// combination maps to a stored mode key (root-only → "major", all three → "major|any").
const enabled    = { major:true, minor:false };
const enabledInv = { 0:true, 1:false, 2:false };
const enabledTypes = ()=>Object.keys(enabled).filter(t=>enabled[t]);
const enabledInvs  = ()=>[0,1,2].filter(i=>enabledInv[i]);
function modeKey(){
  const t = enabledTypes().join('+');
  const invs = enabledInvs();
  if(invs.length===1 && invs[0]===0) return t;
  if(invs.length===3)                return t + '|any';
  return t + '|' + invs.join(',');
}
// Readable label for the chart's empty state ("major|1" → "majors · 1st inv").
function labelForMode(m){
  const [typePart, invPart] = m.split('|');
  const types = typePart.split('+').map(t=>TYPE_LABEL[t]||t).join(' + ');
  if(!invPart)        return types;
  if(invPart==='any') return types + ' · any voicing';
  return types + ' · ' + invPart.split(',').map(i=>INV_LABEL[+i]).join('/');
}

init();
async function init(){
  const { data:{ session } } = await supabase.auth.getSession();
  renderNav(session);
  if(!session){ $('dashGate').hidden=false; $('dashContent').hidden=true; return; }
  $('dashGate').hidden=true; $('dashContent').hidden=false;

  const { data, error } = await supabase.from('scores')
    .select('mode, time_ms, chord_count, played_at, created_at');
  if(error){ console.error(error); return; }
  allScores = (data||[]).sort((a,b) =>
    new Date(a.played_at||a.created_at) - new Date(b.played_at||b.created_at));

  document.querySelectorAll('#typeToggle .filter').forEach(b=>b.onclick=()=>toggleType(b.dataset.type));
  document.querySelectorAll('#invToggle .filter').forEach(b=>b.onclick=()=>toggleInv(+b.dataset.inv));
  renderKpis();
  refresh();   // sets active chips + mode + renders the chart
}

function renderNav(session){
  const nav=$('navAccount');
  if(session){
    const name = session.user.user_metadata?.username || 'account';
    nav.innerHTML = `<div class="user-menu">
        <button class="nav-user" type="button">@${name} <span class="caret">▾</span></button>
        <div class="user-dropdown">
          <a href="/dashboard">My Dashboard</a>
          <a href="/friends">Friends</a>
          <button class="dd-logout" id="logoutBtn">log out</button>
        </div>
      </div>`;
    $('logoutBtn').onclick = async () => { await supabase.auth.signOut(); location.href='/'; };
  } else {
    nav.innerHTML = `<a class="nav-btn" href="/">log in</a>`;
  }
}

function renderKpis(){
  $('kTrials').textContent  = allScores.length;
  $('kChords').textContent  = allScores.reduce((s,r)=>s+(r.chord_count||0),0);
  $('kSeconds').textContent = fmtDuration(allScores.reduce((s,r)=>s+(r.time_ms||0),0)/1000);
}
// Human duration, at most two units: ≤60s → "45s"; ≤60m → "2m 15s"; else "1h 23m".
function fmtDuration(totalSec){
  totalSec = Math.round(totalSec);
  if(totalSec <= 60)   return totalSec + 's';
  if(totalSec <= 3600) return Math.floor(totalSec/60) + 'm ' + (totalSec%60) + 's';
  return Math.floor(totalSec/3600) + 'h ' + Math.floor((totalSec%3600)/60) + 'm';
}

// Filter toggles mirror the main page: keep at least one type and one inversion on.
function toggleType(type){
  if(enabled[type] && enabledTypes().length===1) return;
  enabled[type]=!enabled[type];
  refresh();
}
function toggleInv(i){
  if(enabledInv[i] && enabledInvs().length===1) return;
  enabledInv[i]=!enabledInv[i];
  refresh();
}
function refresh(){
  document.querySelectorAll('#typeToggle .filter').forEach(b=>b.classList.toggle('active', !!enabled[b.dataset.type]));
  document.querySelectorAll('#invToggle .filter').forEach(b=>b.classList.toggle('active', !!enabledInv[b.dataset.inv]));
  mode = modeKey();
  renderChart();
}

function renderChart(){
  const chartEl=$('chart'), empty=$('chartEmpty');
  const rows = allScores.filter(r=>r.mode===mode);
  if(!rows.length){ $('prBanner').innerHTML=''; chartEl.innerHTML=''; empty.textContent='no '+labelForMode(mode)+' runs yet'; empty.style.display='block'; return; }
  empty.style.display='none';
  const series = rows.map((r,i)=>({ i:i+1, t:r.time_ms/1000 }));
  const pr = Math.min(...series.map(d=>d.t));
  $('prBanner').innerHTML = '<span>🏆 personal record <b>'+pr.toFixed(2)+'s</b></span>';

  const W=700,H=300,padL=48,padR=18,padT=18,padB=40;
  const n=series.length, xMin=1, xMax=Math.max(n,2);
  let yMin=Math.min(...series.map(d=>d.t)), yMax=Math.max(...series.map(d=>d.t));
  if(yMin===yMax){ yMin=Math.max(0,yMin-1); yMax=yMax+1; }
  const yp=(yMax-yMin)*0.12; yMin=Math.max(0,yMin-yp); yMax=yMax+yp;
  const X=i=>padL+((i-xMin)/((xMax-xMin)||1))*(W-padL-padR);
  const Y=t=>padT+(1-(t-yMin)/((yMax-yMin)||1))*(H-padT-padB);

  let grid='', ylabs='';
  for(let k=0;k<=4;k++){
    const t=yMin+(yMax-yMin)*k/4, y=Y(t);
    grid+=`<line class="grid" x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}"/>`;
    ylabs+=`<text class="ylab" x="${padL-8}" y="${(y+3.5).toFixed(1)}">${t.toFixed(0)}s</text>`;
  }
  let xlabs='';
  const step=Math.max(1,Math.ceil(n/6));
  const marks=new Set(); for(let i=1;i<=n;i+=step) marks.add(i); marks.add(n);
  marks.forEach(i=>{ xlabs+=`<text class="xlab" x="${X(i).toFixed(1)}" y="${H-padB+20}">${i}</text>`; });

  const baseY=H-padB;
  const path=series.map((d,k)=>(k?'L':'M')+X(d.i).toFixed(1)+' '+Y(d.t).toFixed(1)).join(' ');
  const pts=series.map(d=>{
    const cx=X(d.i).toFixed(1), cy=Y(d.t).toFixed(1), label='#'+d.i+' · '+d.t.toFixed(2)+'s';
    return `<g class="pt" data-cx="${cx}" data-cy="${cy}" data-label="${label}">`
      + `<circle class="hit" cx="${cx}" cy="${cy}" r="16"/>`
      + `<circle class="dot" cx="${cx}" cy="${cy}" r="4.5"/></g>`;
  }).join('');
  const xtitle=`<text class="axis-title" x="${((padL+(W-padR))/2).toFixed(1)}" y="${H-6}">game #</text>`;

  chartEl.innerHTML =
    `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="completion time by game — ${labelForMode(mode)}">`
    + grid
    + `<line class="crosshair" style="display:none"/>`
    + `<path class="line" d="${path}"/>`
    + pts + ylabs + xlabs + xtitle
    + `<g class="tip" style="display:none"><rect rx="6" ry="6" height="22"/><text></text></g>`
    + `</svg>`;

  // hover: grow the dot, show a value tooltip, drop a crosshair to the axis
  const svg=chartEl.querySelector('svg');
  const tip=svg.querySelector('.tip'), tipRect=tip.querySelector('rect'), tipText=tip.querySelector('text');
  const cross=svg.querySelector('.crosshair');
  svg.querySelectorAll('.pt').forEach(g=>{
    const dot=g.querySelector('.dot');
    const cx=parseFloat(g.dataset.cx), cy=parseFloat(g.dataset.cy), label=g.dataset.label;
    g.addEventListener('mouseenter', ()=>{
      dot.setAttribute('r','7.5');
      cross.setAttribute('x1',cx); cross.setAttribute('x2',cx);
      cross.setAttribute('y1',cy.toFixed(1)); cross.setAttribute('y2',baseY);
      cross.style.display='';
      tipText.textContent=label;
      const w=label.length*7.2+18, half=w/2;
      const tx=Math.max(padL+half, Math.min(W-padR-half, cx));
      const above = cy-36 > 2;
      tipRect.setAttribute('x',(tx-half).toFixed(1));
      tipRect.setAttribute('y',(above?cy-34:cy+12).toFixed(1));
      tipRect.setAttribute('width',w.toFixed(1));
      tipText.setAttribute('x',tx.toFixed(1));
      tipText.setAttribute('y',(above?cy-19:cy+27).toFixed(1));
      tip.style.display='';
    });
    g.addEventListener('mouseleave', ()=>{ dot.setAttribute('r','4.5'); tip.style.display='none'; cross.style.display='none'; });
  });
}
</script>
</body>
</html>
