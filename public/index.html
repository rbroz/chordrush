<!-- One module: game + auth + score storage all share scope. -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// Publishable/anon key: safe in frontend + public repo. RLS protects the data.
const SUPABASE_URL = 'https://pkrvnrgqtuvbtusdncok.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_511wgi5up_rKkUMIL91U7A_i_FhDnhE';
const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

/* ---------- Chords ---------- */
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const ROOTS = [
  {name:"C",pc:0},{name:"C♯",pc:1},{name:"D",pc:2},{name:"E♭",pc:3},
  {name:"E",pc:4},{name:"F",pc:5},{name:"F♯",pc:6},{name:"G",pc:7},
  {name:"A♭",pc:8},{name:"A",pc:9},{name:"B♭",pc:10},{name:"B",pc:11},
];
const CHORD_TYPES = {
  major: { label:"majors", suffix:" Major", ivals:[0,4,7] },
  minor: { label:"minors", suffix:" minor", ivals:[0,3,7] },
};
const enabled = { major:true, minor:false };   // which chord types are in the pool

const chordFor = (r,type)=>({ name:r.name+CHORD_TYPES[type].suffix, type, pcs:CHORD_TYPES[type].ivals.map(i=>(r.pc+i)%12) });
const enabledTypes = ()=>Object.keys(CHORD_TYPES).filter(t=>enabled[t]);
function buildOrder(){
  const list=[];
  for(const type of enabledTypes()) for(const r of ROOTS) list.push(chordFor(r,type));
  return shuffled(list);
}
function shuffled(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------- Mode (drives which leaderboard is active) ---------- */
const modeKey   = ()=>enabledTypes().join("+");                                   // "major" | "minor" | "major+minor"
const modeLabel = ()=>enabledTypes().map(t=>CHORD_TYPES[t].label).join(" + ");
const MAX_TOP=5;

/* ---------- State ---------- */
let midiAccess=null, currentInput=null;
const heldNotes=new Map();
let order=[], idx=0, phase="idle";      // idle | ready | running | done
let startTime=0, completions=[], rafId=null;
const sessionRuns={};                   // modeKey -> last finished run this session (for restoring the view)
let currentSession=null;                // set by renderAuth(); drives DB-vs-localStorage

/* ---------- DOM ---------- */
const $=id=>document.getElementById(id);
const statusDot=$("statusDot"), statusText=$("statusText"), deviceSelect=$("deviceSelect"), errBox=$("errBox");
const stage=$("stage"), idleMsg=$("idleMsg"), playWrap=$("playWrap"), doneWrap=$("doneWrap");
const chordName=$("chordName"), heldLine=$("heldLine"), promptLabel=$("promptLabel");
const hud=$("hud"), hTime=$("hTime"), hProg=$("hProg"), hBest=$("hBest");
const filterbar=$("filterbar");
const modal=$("authModal"), msg=$("authMsg"), loginForm=$("loginForm"), signupForm=$("signupForm");
const setMsg=(t,kind='')=>{ msg.textContent=t; msg.className='modal-msg'+(kind?' '+kind:''); };

/* ---------- MIDI ---------- */
async function initMidi(){
  errBox.style.display="none";
  if(!navigator.requestMIDIAccess){ setStatus(false,"Web MIDI not supported — use Chrome/Edge"); return; }
  try {
    midiAccess=await navigator.requestMIDIAccess({sysex:false});
    midiAccess.onstatechange=refreshDevices;
    refreshDevices();
  } catch(e){ setStatus(false,"MIDI access denied"); showErr("MIDI blocked. Allow MIDI for this page in Chrome and reload."); }
}
function refreshDevices(){
  const inputs=midiAccess?[...midiAccess.inputs.values()]:[];
  deviceSelect.innerHTML="";
  if(!inputs.length){ deviceSelect.style.display="none"; setStatus(false,"no keyboard detected"); currentInput=null; return; }
  inputs.forEach((inp,i)=>{ const o=document.createElement("option"); o.value=inp.id; o.textContent=inp.name||("Input "+i); deviceSelect.appendChild(o); });
  deviceSelect.style.display = inputs.length>1 ? "" : "none";
  const keep=currentInput&&inputs.some(i=>i.id===currentInput.id);
  selectInput(keep?currentInput.id:inputs[0].id);
}
function selectInput(id){
  if(currentInput) currentInput.onmidimessage=null;
  currentInput=[...midiAccess.inputs.values()].find(i=>i.id===id)||null;
  if(currentInput){ currentInput.onmidimessage=onMidi; deviceSelect.value=id; setStatus(true, currentInput.name||"MIDI input"); }
}
function setStatus(on,t){ statusDot.classList.toggle("on",on); statusText.textContent=t; }
function showErr(m){ errBox.textContent=m; errBox.style.display="block"; }

function onMidi(ev){
  const [status,d1,d2]=ev.data, cmd=status&0xF0;
  if(cmd===0x90&&d2>0) heldNotes.set(d1,d2);
  else if(cmd===0x80||(cmd===0x90&&d2===0)) heldNotes.delete(d1);
  else return;
  renderHeld();
  if(phase==="ready"||phase==="running") checkMatch();
}
function renderHeld(){
  const notes=[...heldNotes.keys()].sort((a,b)=>a-b);
  heldLine.textContent = notes.length ? notes.map(n=>NOTE_NAMES[n%12]).join("  ") : "";
}

/* ---------- Matching ---------- */
function checkMatch(){
  const notes=[...heldNotes.keys()];
  if(!notes.length) return;
  const held=new Set(notes.map(n=>n%12));
  const tgt=new Set(order[idx].pcs);
  if(held.size!==tgt.size) return;
  for(const p of tgt) if(!held.has(p)) return;
  advance();
}

/* ---------- Filter bar ---------- */
function toggleType(type){
  if(phase==="running") return;                          // locked only once the clock is running
  if(enabled[type] && enabledTypes().length===1) return; // keep at least one on
  enabled[type]=!enabled[type];
  if(phase==="ready"){                                    // reconfigure the not-yet-started run
    updateModeUI();
    order=buildOrder(); idx=0;
    hProg.textContent="1 / "+order.length;
    showChord();
  } else {
    showStage();
  }
}
async function updateModeUI(){
  document.querySelectorAll(".filter").forEach(b=>b.classList.toggle("active", !!enabled[b.dataset.type]));
  $("boardTitle").textContent = "Top 5 · " + modeLabel();
  await refreshBoard();
}
// Reflect the selected filter in the stage: restore this mode's finished run if
// one exists this session, otherwise show a fresh "press start".
function showStage(){
  updateModeUI();
  const snap=sessionRuns[modeKey()];
  if(snap){
    idleMsg.style.display="none"; playWrap.style.display="none";
    doneWrap.innerHTML=snap.doneHTML; doneWrap.style.display="block";
    hud.style.display="flex"; hTime.classList.remove("dim");
    hTime.textContent=snap.timeText; hProg.textContent=snap.progText;
    phase="done";
  } else {
    doneWrap.style.display="none"; playWrap.style.display="none";
    idleMsg.style.display="block";
    hud.style.display="none";
    phase="idle";
  }
  syncStartBtn();
}

/* ---------- Game flow ---------- */
function syncStartBtn(){ $("startBtn").textContent = phase==="running" ? "restart" : "start"; }
function start(){
  if(!currentInput){ showErr("no MIDI device connected — click reconnect"); return; }
  errBox.style.display="none";
  cancelAnimationFrame(rafId);   // kill any timer still running (e.g. restart mid-run) so loops don't stack
  order=buildOrder();
  idx=0; completions=[]; startTime=0; phase="ready";
  doneWrap.style.display="none"; idleMsg.style.display="none"; playWrap.style.display="block";
  filterbar.classList.remove("locked");   // stays changeable until the clock starts
  hud.style.display="flex";
  hTime.textContent="0.00"; hTime.classList.add("dim");
  hProg.textContent="1 / "+order.length;
  refreshBest();
  promptLabel.textContent="play to start";
  showChord();
  syncStartBtn();
}
function showChord(){ chordName.textContent=order[idx].name; }

function advance(){
  const now=performance.now();
  flash();
  if(phase==="ready"){                 // first chord = the go-signal
    startTime=now; completions=[now]; phase="running";
    filterbar.classList.add("locked");  // lock the pool now that the clock is running
    syncStartBtn();                     // now running → button becomes "restart"
    hTime.classList.remove("dim");
    promptLabel.textContent="play";
    idx=1; hProg.textContent=(idx+1)+" / "+order.length; showChord();
    tick();
    return;
  }
  completions.push(now);
  idx++;
  if(idx>=order.length){ finish(); return; }
  hProg.textContent=(idx+1)+" / "+order.length;
  showChord();
}

function tick(){
  hTime.textContent=((performance.now()-startTime)/1000).toFixed(2);
  rafId=requestAnimationFrame(tick);
}

async function finish(){
  cancelAnimationFrame(rafId);
  phase="done";
  syncStartBtn();
  filterbar.classList.remove("locked");
  const total=(completions[completions.length-1]-startTime)/1000;
  const timeMs=Math.round(total*1000);
  const playedAt=new Date().toISOString();   // unique per run → dedup key + accurate date
  hTime.textContent=total.toFixed(2);
  playWrap.style.display="none"; doneWrap.style.display="block";
  $("doneTotal").textContent=total.toFixed(2)+"s";

  // save the run (DB if logged in, else localStorage), then read back the fresh top 5
  await addScore(modeKey(), timeMs, order.length, playedAt);
  const top = await getTop(modeKey());
  const rank = top.findIndex(e => e.t.toFixed(2) === total.toFixed(2));

  if(rank===0)      $("pbWrap").innerHTML='<div class="pb-badge">★ new best time</div>';
  else if(rank>0)   $("pbWrap").innerHTML=`<div class="pb-badge">new top 5 — #${rank+1}</div>`;
  else              $("pbWrap").innerHTML=`<div class="note-line">not a top-5 time — best is ${top.length?top[0].t.toFixed(2):'?'}s</div>`;

  renderSplits();
  await refreshBoard(rank, top);

  sessionRuns[modeKey()]={ doneHTML:doneWrap.innerHTML, timeText:hTime.textContent, progText:hProg.textContent };
}

function renderSplits(){
  const durs=[];
  for(let k=1;k<completions.length;k++) durs.push(completions[k]-completions[k-1]);
  const min=Math.min(...durs), max=Math.max(...durs);
  const sp=$("splits"); sp.innerHTML="";
  const trig=document.createElement("div");
  trig.className="split-row";
  trig.innerHTML=`<span class="nm">${order[0].name}</span><span class="tm">start</span>`;
  sp.appendChild(trig);
  for(let k=1;k<order.length;k++){
    const d=(completions[k]-completions[k-1])/1000;
    const row=document.createElement("div");
    row.className="split-row"+(completions[k]-completions[k-1]===min?" fast":(completions[k]-completions[k-1]===max?" slow":""));
    row.innerHTML=`<span class="nm">${order[k].name}</span><span class="tm">${d.toFixed(2)}s</span>`;
    sp.appendChild(row);
  }
}
function flash(){ stage.classList.remove("flash-good"); void stage.offsetWidth; stage.classList.add("flash-good"); }

/* ---------- Score storage: DB when logged in, localStorage when guest ---------- */
async function getTop(mode){
  if(currentSession){
    const { data, error } = await supabase
      .from('scores').select('time_ms, created_at, played_at')
      .eq('mode', mode).order('time_ms', { ascending:true }).limit(MAX_TOP);
    if(error){ console.error('getTop', error); return []; }
    return data.map(r => ({ t: r.time_ms/1000, d: r.played_at || r.created_at }));
  }
  return localTop(mode);
}
async function addScore(mode, timeMs, chordCount, playedAt){
  if(currentSession){
    // played_at is the run's unique key; on conflict the DB ignores the dup
    const { error } = await supabase.from('scores').upsert(
      { user_id: currentSession.user.id, mode, time_ms: timeMs, chord_count: chordCount, played_at: playedAt },
      { onConflict:'user_id,played_at', ignoreDuplicates:true }
    );
    if(error) console.error('addScore', error);
  } else {
    localAddScore(mode, timeMs, playedAt);
  }
}
function localKey(mode){ return 'chordrushTop5:'+mode; }
function localTop(mode){ try{ const a=JSON.parse(localStorage.getItem(localKey(mode))); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function localAddScore(mode, timeMs, playedAt){
  const arr=localTop(mode);
  arr.push({ t:timeMs/1000, d:playedAt });   // d = finish time, becomes played_at on migration
  arr.sort((a,b)=>a.t-b.t);
  localStorage.setItem(localKey(mode), JSON.stringify(arr.slice(0,MAX_TOP)));
}
function migrateLegacy(){   // old local keys → current local key (guest history only)
  const mk=localKey('major');
  if(localStorage.getItem(mk)) return;
  const oldBoard=localStorage.getItem("chordrushTop5V1");
  if(oldBoard){ localStorage.setItem(mk, oldBoard); return; }
  const oldBest=parseFloat(localStorage.getItem("majorRunBestV1")||"");
  if(!isNaN(oldBest)) localStorage.setItem(mk, JSON.stringify([{t:oldBest, d:new Date().toISOString()}]));
}
// On login, move any guest (localStorage) times into the account once, then clear them.
async function migrateLocalToAccount(){
  if(!currentSession) return;
  const uid=currentSession.user.id;
  const modes=['major','minor','major+minor'];

  // Snapshot guest scores and clear local IMMEDIATELY (before the async insert),
  // so the same data can never be imported twice — even on rapid re-logins.
  // This still merges guest play for EXISTING accounts (no data discarded).
  const rows=[];
  for(const mode of modes){
    for(const e of localTop(mode)){
      rows.push({ user_id:uid, mode, time_ms:Math.round(e.t*1000), chord_count: mode==='major+minor'?24:12, played_at:e.d });
    }
    localStorage.removeItem(localKey(mode));
  }
  if(!rows.length) return;

  // upsert on (user_id, played_at): re-importing the same run is a harmless no-op
  const { error } = await supabase.from('scores').upsert(rows, { onConflict:'user_id,played_at', ignoreDuplicates:true });
  if(error){
    // insert failed → restore local so nothing is lost; it'll retry next login
    console.error('migrate insert', error);
    const byMode={};
    for(const r of rows){ const g = byMode[r.mode] || (byMode[r.mode]=[]); g.push({ t:r.time_ms/1000, d:r.played_at }); }
    for(const mode in byMode) localStorage.setItem(localKey(mode), JSON.stringify(byMode[mode]));
  }
}

/* ---------- Board rendering ---------- */
async function refreshBest(){
  const t = await getTop(modeKey());
  hBest.textContent = t.length ? t[0].t.toFixed(2)+'s' : '—';
}
async function refreshBoard(justSetRank, prefetched){
  const t = prefetched || await getTop(modeKey());
  hBest.textContent = t.length ? t[0].t.toFixed(2)+'s' : '—';
  const list=$("boardList"), empty=$("boardEmpty");
  list.innerHTML="";
  if(!t.length){ empty.style.display="block"; return; }
  empty.style.display="none";
  t.forEach((e,i)=>{
    const li=document.createElement("li");
    li.className=(i===0?"top1 ":"")+(i===justSetRank?"justset":"");
    let date="";
    try { date=new Date(e.d).toLocaleDateString(undefined,{month:"short",day:"numeric"}); } catch(err){}
    li.innerHTML=`<span class="rank">${i+1}</span><span class="time">${e.t.toFixed(2)}s</span><span class="date">${date}</span>`;
    list.appendChild(li);
  });
}

/* ---------- Auth: modal + signup + login + nav state ---------- */
function setAuthMode(mode){
  const login = mode === 'login';
  $('authTitle').textContent = login ? 'Log in' : 'Create account';
  loginForm.hidden = !login;
  signupForm.hidden = login;
  $('authSwitch').innerHTML = login
    ? `Need an account? <a id="toSignup">Sign up</a>`
    : `Have an account? <a id="toLogin">Log in</a>`;
  $(login ? 'toSignup' : 'toLogin').onclick = () => { setMsg(''); setAuthMode(login ? 'signup' : 'login'); };
  setMsg('');
}
function openModal(mode='login'){ setAuthMode(mode); modal.hidden=false; $(mode==='login'?'liId':'suUsername').focus(); }
function closeModal(){ modal.hidden=true; setMsg(''); }

async function handleSignup(e){
  e.preventDefault();
  const username=$('suUsername').value.trim(), email=$('suEmail').value.trim();
  const password=$('suPassword').value, confirm=$('suConfirm').value;
  if(!/^[A-Za-z0-9_]{3,20}$/.test(username)) return setMsg('Username: 3–20 letters, numbers, or _', 'error');
  if(!email)               return setMsg('Enter your email', 'error');
  if(password.length < 6)  return setMsg('Password must be at least 6 characters', 'error');
  if(password !== confirm) return setMsg('Passwords do not match', 'error');

  const submit=$('signupSubmit'); submit.disabled=true; setMsg('Creating account…');
  const pattern=username.replace(/[\\%_]/g, '\\$&');
  const { data: existing, error: checkErr } =
    await supabase.from('profiles').select('id').ilike('username', pattern).limit(1);
  if(checkErr){ submit.disabled=false; return setMsg('Could not check username: '+checkErr.message, 'error'); }
  if(existing && existing.length){ submit.disabled=false; return setMsg('That username is taken', 'error'); }

  const { error } = await supabase.auth.signUp({
    email, password, options:{ data:{ username }, emailRedirectTo: window.location.origin }
  });
  submit.disabled=false;
  if(error) return setMsg(error.message, 'error');
  setMsg('Account created! Check '+email+' to verify, then log in.', 'ok');
  signupForm.reset();
}

async function handleLogin(e){
  e.preventDefault();
  const identifier=$('liId').value.trim(), password=$('liPassword').value;
  if(!identifier || !password) return setMsg('Enter your login and password', 'error');
  const submit=$('loginSubmit'); submit.disabled=true; setMsg('Logging in…');
  try {
    const resp = await fetch('/api/login', {
      method:'POST', headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ identifier, password })
    });
    const data = await resp.json();
    if(!resp.ok){ submit.disabled=false; return setMsg(data.error || 'Login failed', 'error'); }
    const { error } = await supabase.auth.setSession({ access_token:data.access_token, refresh_token:data.refresh_token });
    submit.disabled=false;
    if(error) return setMsg(error.message, 'error');
    loginForm.reset();
    closeModal();
    await renderAuth();             // sets currentSession + nav
    await migrateLocalToAccount();  // move guest times into the account (once)
    await updateModeUI();           // board now reflects the account
  } catch(err){
    submit.disabled=false;
    setMsg('Login failed — try again', 'error');
  }
}

async function renderAuth(){
  const { data: { session } } = await supabase.auth.getSession();
  currentSession = session;
  const nav = $('navAccount');
  if(session){
    const name = session.user.user_metadata?.username || 'account';
    nav.innerHTML = `<div class="user-menu">
        <button class="nav-user" type="button">@${name} <span class="caret">▾</span></button>
        <div class="user-dropdown">
          <a href="/dashboard">My Dashboard</a>
          <a href="/friends">Friends</a>
          <button class="dd-logout" id="logoutBtn">log out</button>
        </div>
      </div>`;
    $('logoutBtn').onclick = async () => {
      await supabase.auth.signOut();
      currentSession = null;
      await renderAuth();
      await updateModeUI();   // board back to guest (localStorage)
    };
  } else {
    nav.innerHTML = `<button class="nav-btn" id="authBtn">log in</button>`;
    $('authBtn').onclick = () => openModal('login');
  }
}

/* ---------- Wire up ---------- */
$("reconnectBtn").onclick=initMidi;
deviceSelect.onchange=e=>selectInput(e.target.value);
$("startBtn").onclick=start;
document.querySelectorAll(".filter").forEach(b=>b.onclick=()=>toggleType(b.dataset.type));
document.addEventListener("keydown",e=>{ if(e.code==="Space"&&phase!=="ready"&&phase!=="running"&&modal.hidden){ e.preventDefault(); start(); } });

$('authClose').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if(e.target===modal) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape' && !modal.hidden) closeModal(); });
modal.addEventListener('keydown', e => {   // Enter submits whichever form is showing
  if(e.key==='Enter'){ e.preventDefault(); (loginForm.hidden ? signupForm : loginForm).requestSubmit(); }
});
signupForm.addEventListener('submit', handleSignup);
loginForm.addEventListener('submit', handleLogin);

/* ---------- Init ---------- */
migrateLegacy();
renderAuth().then(() => updateModeUI());
syncStartBtn();
initMidi();
</script>
</body>
</html>
